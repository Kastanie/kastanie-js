<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Beschreibung der App">
    <title>App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
    </style>
</head>
<body>
    <!-- Sections stellen Screens dar, die je nach Hash-Tag an und ausgeschaltet werden. -->
    <section id="start" class="screen">
        <h1>Willkommen zur App</h1>
        <p>Dies ist eine Beispiel-App, die die App-Komponente, den App-Notifier und den App-Viewport-Observer verwendet.</p>
        <a href="#screen1">Gehe zu Screen 1</a>
    </section>

    <section id="screen1" class="screen" style="display:none;">
        <h1>Screen 1</h1>
        <p>Dies ist der erste Screen.</p>
        <div id="example" data-component="Example" data-view="ExampleView"><!-- Ausgabe der Beispielkomponente --></div>
        <a href="#start">Zurück zum Start</a>
    </section>
</body>
</html>
